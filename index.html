<!DOCTYPE html>
<html>
<style>
#ausgabe{
font-size: 1.2em;
height: 30px;
padding:10px;
}
</style>

<head>
<meta charset=utf-8 />
<meta name="viewport"
content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0,
maximum-scale=1.0, user-scalable=no" />

<!-- Add to homescreen for Chrome on Android. Fallback for manifest.json -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Euro - Dollar">

<!-- Add to homescreen for Safari on iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Euro - Dollar">

<!-- Homescreen icons -->
<link rel="apple-touch-icon" sizes="192x192" href="/icon/icon-192x192.png">
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="msapplication-TileImage" content="/icon/icon-144x144.png">
<meta name="theme-color" content="#ffffff">

<link rel='manifest' href='manifest.json'>

</head>
  
<script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./service-worker.js');
    console.log("Service Worker registered");
  });
}
  
function dollareuro(){
var kurs = 0.89;
document.getElementById('ausgabe').innerHTML= kurs * document.myformular.dollar.value;
}
</script>
<body>

<h2>Berechne den entsprechenden Eurowert</h2>

<form name="myformular">
<input type="text" name="dollar" />
<button type="button" onclick="dollareuro()" >Umrechnen</button>
</form>

<div id="ausgabe"></div>
</body>

</html>
